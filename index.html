<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading…</title>
<style>
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden;
               font-family: system-ui, sans-serif; }
  #bar { display: flex; gap: 1rem; padding: 0.5rem 1rem;
         background: #f6f8fa; border-bottom: 1px solid #d1d9e0; font-size: 13px;
         align-items: center; }
  #bar a { color: #0969da; text-decoration: none; }
  #bar a:hover { text-decoration: underline; }
  .spacer { flex: 1; }
  #bar .brand { display: flex; align-items: center; gap: 0.35rem;
                color: #656d76; text-decoration: none; font-weight: 500; }
  #bar .brand:hover { color: #0969da; }
  #bar .brand svg { fill: currentColor; }
  #content { width: 100%; height: calc(100vh - 37px); overflow: auto;
             display: flex; align-items: center; justify-content: center;
             background: #fafbfc; }
  #content iframe, #content embed { border: 0; width: 100%; height: 100%;
                                     background: white; }
  #content img, #content video { max-width: 100%; max-height: 100%; object-fit: contain; }
  #content audio { width: 80%; }
  #content pre { width: 100%; height: 100%; margin: 0; padding: 1rem;
                 box-sizing: border-box; overflow: auto; background: white;
                 font-family: ui-monospace, Menlo, Consolas, monospace;
                 font-size: 13px; white-space: pre-wrap; word-wrap: break-word; }
  #content .download { padding: 2rem; font-size: 15px; }
  .err { padding: 2rem; color: #cf222e; font-family: system-ui, sans-serif; }
  .md-toggle { display: inline-flex; border: 1px solid #d1d9e0; border-radius: 6px;
               overflow: hidden; height: 22px; }
  .md-toggle button { border: 0; background: white; padding: 0 0.6rem;
                       font-size: 12px; font-family: inherit; cursor: pointer;
                       color: #656d76; }
  .md-toggle button.active { background: #eaeef2; color: #1f2328; }
  .md-toggle button + button { border-left: 1px solid #d1d9e0; }
</style>
</head>
<body>
<div id="bar"></div>
<div id="content"></div>
<script>
function showError(msg) {
  document.body.innerHTML = '<div class="err"></div>';
  document.querySelector('.err').textContent = msg;
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function b64ToBlob(b64, mime) {
  return new Blob([b64ToBytes(b64)], { type: mime });
}

function b64urlToBytes(s) {
  const pad = (4 - s.length % 4) % 4;
  return b64ToBytes((s + '='.repeat(pad)).replace(/-/g, '+').replace(/_/g, '/'));
}

function concatBytes(arrays) {
  const total = arrays.reduce((n, a) => n + a.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const a of arrays) { out.set(a, off); off += a.length; }
  return out;
}

async function sha256(bytes) {
  return new Uint8Array(await crypto.subtle.digest('SHA-256', bytes));
}

// Decrypt payload produced by share-file --encrypt.
// Format: base64( IV(16) || ciphertext || HMAC-SHA256(32) )
// Keys derived from 16-byte master: enc = first16(SHA256(0x01||M)), mac = SHA256(0x02||M).
async function decryptPayload(masterKeyB64url, payloadB64) {
  const master = b64urlToBytes(masterKeyB64url);
  if (master.length !== 16) throw new Error('Invalid key length');
  const blob = b64ToBytes(payloadB64);
  if (blob.length < 16 + 16 + 32) throw new Error('Encrypted payload too short');
  const iv = blob.subarray(0, 16);
  const mac = blob.subarray(blob.length - 32);
  const ct = blob.subarray(16, blob.length - 32);
  const encKeyBytes = (await sha256(concatBytes([new Uint8Array([0x01]), master]))).subarray(0, 16);
  const macKeyBytes = await sha256(concatBytes([new Uint8Array([0x02]), master]));
  const macKey = await crypto.subtle.importKey(
    'raw', macKeyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['verify']);
  const ok = await crypto.subtle.verify('HMAC', macKey, mac, concatBytes([iv, ct]));
  if (!ok) throw new Error('Authentication failed (wrong key or tampered data)');
  const encKey = await crypto.subtle.importKey(
    'raw', encKeyBytes, { name: 'AES-CBC' }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, encKey, ct);
  return new TextDecoder().decode(pt);
}

function isTextMime(mime) {
  return mime.startsWith('text/') ||
         /^application\/(json|xml|javascript|x-yaml|yaml)$/.test(mime) ||
         mime === 'image/svg+xml';
}

function isMarkdown(filename, mime) {
  return mime === 'text/markdown' || /\.(md|markdown)$/i.test(filename || '');
}

let _markedPromise = null;
function loadMarked() {
  if (!_markedPromise) {
    _markedPromise = import('https://cdn.jsdelivr.net/npm/marked@12/+esm')
      .then(mod => { mod.marked.setOptions({ gfm: true, breaks: false }); return mod.marked; });
  }
  return _markedPromise;
}

const MD_STYLES = `
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
         max-width: 760px; margin: 2rem auto; padding: 0 1.5rem; color: #1f2328;
         line-height: 1.6; font-size: 15px; }
  h1, h2, h3, h4, h5, h6 { margin: 1.5em 0 0.5em; line-height: 1.25; font-weight: 600; }
  h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
  h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
  h3 { font-size: 1.25em; }
  h4 { font-size: 1em; }
  p { margin: 0 0 1em; }
  a { color: #0969da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
         font-size: 0.88em; padding: 0.2em 0.4em; background: #eff1f3; border-radius: 4px; }
  pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto;
        line-height: 1.45; }
  pre code { background: none; padding: 0; font-size: 13px; }
  blockquote { border-left: 4px solid #d1d9e0; padding: 0 1em; color: #59636e;
               margin: 0 0 1em; }
  ul, ol { padding-left: 2em; margin: 0 0 1em; }
  li { margin: 0.25em 0; }
  li > ul, li > ol { margin-top: 0.25em; }
  table { border-collapse: collapse; margin: 1em 0; }
  th, td { border: 1px solid #d1d9e0; padding: 0.4em 0.85em; }
  th { background: #f6f8fa; }
  img { max-width: 100%; }
  hr { border: 0; border-top: 1px solid #d1d9e0; margin: 2em 0; }
`;

async function renderMarkdown(text, container) {
  let html;
  try {
    const marked = await loadMarked();
    html = marked.parse(text);
  } catch (e) {
    container.innerHTML = '';
    const pre = document.createElement('pre');
    pre.textContent = text;
    container.appendChild(pre);
    return;
  }
  container.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-popups allow-popups-to-escape-sandbox';
  iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="utf-8">' +
                  '<base target="_blank">' +
                  '<style>' + MD_STYLES + '</style></head><body>' +
                  html + '</body></html>';
  container.appendChild(iframe);
}

async function renderFile(filename, content, mime, encoding, opts) {
  opts = opts || {};
  const container = document.getElementById('content');
  container.innerHTML = '';

  let text = null;
  let blobUrl = null;
  if (encoding === 'base64') {
    blobUrl = URL.createObjectURL(b64ToBlob(content, mime));
    if (isTextMime(mime) || mime === 'text/html' || isMarkdown(filename, mime)) {
      try { text = atob(content); } catch (_) {}
    }
  } else {
    text = content;
    blobUrl = URL.createObjectURL(new Blob([content], { type: mime }));
  }

  if (isMarkdown(filename, mime) && text != null) {
    if (opts.mdMode === 'raw') {
      const pre = document.createElement('pre');
      pre.textContent = text;
      container.appendChild(pre);
    } else {
      await renderMarkdown(text, container);
    }
  } else if (mime === 'text/html') {
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-popups allow-popups-to-escape-sandbox allow-forms';
    iframe.srcdoc = '<base target="_blank">' + text;
    container.appendChild(iframe);
  } else if (mime === 'image/svg+xml') {
    const img = document.createElement('img');
    img.src = blobUrl;
    img.alt = filename;
    container.appendChild(img);
  } else if (mime.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = blobUrl;
    img.alt = filename;
    container.appendChild(img);
  } else if (mime === 'application/pdf') {
    const embed = document.createElement('embed');
    embed.src = blobUrl;
    embed.type = 'application/pdf';
    container.appendChild(embed);
  } else if (mime.startsWith('audio/')) {
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.src = blobUrl;
    container.appendChild(audio);
  } else if (mime.startsWith('video/')) {
    const video = document.createElement('video');
    video.controls = true;
    video.src = blobUrl;
    container.appendChild(video);
  } else if (isTextMime(mime)) {
    const pre = document.createElement('pre');
    pre.textContent = text;
    container.appendChild(pre);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'download';
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    a.textContent = 'Download ' + filename;
    wrap.appendChild(a);
    const note = document.createElement('div');
    note.style.color = '#656d76';
    note.style.marginTop = '0.5rem';
    note.style.fontSize = '13px';
    note.textContent = mime + ' — no inline preview available';
    wrap.appendChild(note);
    container.appendChild(wrap);
  }
}

async function fetchContent(file) {
  if (!file.truncated) return file.content;
  const res = await fetch(file.raw_url);
  return res.text();
}

async function main() {
  const id = (location.search.slice(1) || location.hash.slice(1)).trim();
  if (!id) {
    showError('Usage: ?<gist-id>');
    return;
  }

  let gist;
  try {
    const res = await fetch('https://api.github.com/gists/' + encodeURIComponent(id));
    if (!res.ok) {
      showError('Failed to fetch gist: ' + res.status);
      return;
    }
    gist = await res.json();
  } catch (e) {
    showError('Network error: ' + e.message);
    return;
  }

  let filename, mime, encoding, content;
  let meta = null;
  const metaFile = gist.files['_meta.json'];
  if (metaFile) {
    try {
      meta = JSON.parse(await fetchContent(metaFile));
    } catch (e) {
      showError('Invalid _meta.json: ' + e.message);
      return;
    }
  }

  if (meta && meta.encrypted) {
    const key = new URLSearchParams(location.hash.slice(1)).get('k');
    if (!key) {
      showError('This share is encrypted. The decryption key (#k=...) is missing from the URL.');
      return;
    }
    const payloadFile = gist.files['payload.b64'];
    if (!payloadFile) {
      showError('Encrypted gist is missing payload.b64');
      return;
    }
    let payloadB64;
    try {
      payloadB64 = (await fetchContent(payloadFile)).trim();
    } catch (e) {
      showError('Failed to load encrypted payload: ' + e.message);
      return;
    }
    let inner;
    try {
      inner = JSON.parse(await decryptPayload(key, payloadB64));
    } catch (e) {
      showError('Decryption failed: ' + e.message);
      return;
    }
    filename = inner.filename;
    mime = inner.mime_type;
    encoding = inner.encoding;
    content = inner.content;
  } else {
    if (meta) {
      filename = meta.filename;
      mime = meta.mime_type;
      encoding = meta.encoding;
    } else {
      const fallback = gist.files['index.html'] ||
                       Object.values(gist.files).find(f => f.filename.endsWith('.html')) ||
                       Object.values(gist.files)[0];
      if (!fallback) { showError('No file found in gist'); return; }
      filename = fallback.filename;
      mime = fallback.type || 'text/plain';
      encoding = 'raw';
    }
    const file = gist.files[filename];
    if (!file) {
      showError('File "' + filename + '" not found in gist');
      return;
    }
    try {
      content = await fetchContent(file);
    } catch (e) {
      showError('Failed to load file content: ' + e.message);
      return;
    }
  }

  document.title = filename;
  const bar = document.getElementById('bar');
  const strong = document.createElement('strong');
  strong.textContent = filename;
  const link = document.createElement('a');
  link.href = gist.html_url;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = 'source';
  const owner = document.createElement('span');
  owner.style.color = '#656d76';
  owner.textContent = 'by ' + (gist.owner && gist.owner.login || 'anonymous');
  bar.appendChild(strong);
  bar.appendChild(link);
  bar.appendChild(owner);

  const spacer = document.createElement('div');
  spacer.className = 'spacer';
  bar.appendChild(spacer);

  let mdMode = null;
  if (isMarkdown(filename, mime)) {
    mdMode = localStorage.getItem('share-file:md-mode') === 'raw' ? 'raw' : 'rendered';
    const toggle = document.createElement('div');
    toggle.className = 'md-toggle';
    const setMode = (m) => {
      mdMode = m;
      localStorage.setItem('share-file:md-mode', m);
      toggle.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === m));
      renderFile(filename, content, mime, encoding, { mdMode: m });
    };
    [['rendered', 'Rendered'], ['raw', 'Raw']].forEach(([m, label]) => {
      const btn = document.createElement('button');
      btn.dataset.mode = m;
      btn.textContent = label;
      if (m === mdMode) btn.classList.add('active');
      btn.addEventListener('click', () => setMode(m));
      toggle.appendChild(btn);
    });
    bar.appendChild(toggle);
  }

  const brand = document.createElement('a');
  brand.className = 'brand';
  brand.href = 'https://github.com/alecgard/share-file';
  brand.target = '_blank';
  brand.rel = 'noopener';
  brand.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>ShareFile';
  bar.appendChild(brand);

  renderFile(filename, content, mime, encoding, { mdMode });
}
main();
</script>
</body>
</html>
